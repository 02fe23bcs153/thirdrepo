<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header-subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .search-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .search-box {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        input[type="text"],
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-section {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .student-name {
            font-weight: 600;
            color: #333;
        }

        .course-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .enrollment-id {
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view {
            background: #e3f2fd;
            color: #1565c0;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
        }

        .btn-small:hover {
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #666;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
        }

        .detail-row {
            margin-bottom: 15px;
        }

        .detail-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .search-box {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>📊 Student Dashboard</h1>
                <p class="header-subtitle">Manage and view all registered students</p>
            </div>
            <div class="header-actions">
                <button class="btn-primary" onclick="window.location.href='index.html'">+ New Registration</button>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalStudents">0</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCourses">0</div>
                <div class="stat-label">Courses</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="maleCount">0</div>
                <div class="stat-label">Male Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="femaleCount">0</div>
                <div class="stat-label">Female Students</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name or email...">
                <select id="courseFilter">
                    <option value="">All Courses</option>
                    <option value="B.Tech">B.Tech</option>
                    <option value="B.Sc">B.Sc</option>
                    <option value="B.Com">B.Com</option>
                    <option value="B.A">B.A</option>
                </select>
                <select id="genderFilter">
                    <option value="">All Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <button class="btn-secondary" onclick="resetFilters()">Reset</button>
            </div>
        </div>

        <!-- Table Section -->
        <div class="table-section">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>Enrollment ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Course</th>
                        <th>Gender</th>
                        <th>City</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px;">Loading students...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Student Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allStudents = [];

        function loadStudents() {
            allStudents = JSON.parse(localStorage.getItem('students')) || [];
            displayStudents(allStudents);
            updateStatistics();
        }

        function displayStudents(students) {
            const tableBody = document.getElementById('tableBody');

            if (students.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-state-icon">📚</div>
                                <h2>No Students Yet</h2>
                                <p>Start by registering your first student!</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = students.map((student, index) => `
                <tr>
                    <td><span class="enrollment-id">${student.enrollmentId || 'N/A'}</span></td>
                    <td><span class="student-name">${student.firstName} ${student.lastName}</span></td>
                    <td>${student.email}</td>
                    <td>${student.phone}</td>
                    <td><span class="course-badge">${student.course}</span></td>
                    <td>${student.gender}</td>
                    <td>${student.city}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-small btn-view" onclick="viewDetails(${index})">View</button>
                            <button class="btn-small btn-delete" onclick="deleteStudent(${index})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStatistics() {
            const total = allStudents.length;
            const courses = new Set(allStudents.map(s => s.course)).size;
            const males = allStudents.filter(s => s.gender === 'Male').length;
            const females = allStudents.filter(s => s.gender === 'Female').length;

            document.getElementById('totalStudents').textContent = total;
            document.getElementById('totalCourses').textContent = courses;
            document.getElementById('maleCount').textContent = males;
            document.getElementById('femaleCount').textContent = females;
        }

        function viewDetails(index) {
            const student = allStudents[index];
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Enrollment ID</div>
                    <div class="detail-value">${student.enrollmentId || 'N/A'}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Full Name</div>
                    <div class="detail-value">${student.firstName} ${student.lastName}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Email</div>
                    <div class="detail-value">${student.email}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Phone</div>
                    <div class="detail-value">${student.phone}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Date of Birth</div>
                    <div class="detail-value">${student.dob}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Gender</div>
                    <div class="detail-value">${student.gender}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Course</div>
                    <div class="detail-value">${student.course}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Address</div>
                    <div class="detail-value">${student.address}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">City, State</div>
                    <div class="detail-value">${student.city}, ${student.state}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Registration Date</div>
                    <div class="detail-value">${student.registrationDate}</div>
                </div>
            `;

            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function deleteStudent(index) {
            const student = allStudents[index];
            if (confirm(`Are you sure you want to delete ${student.firstName} ${student.lastName}?`)) {
                allStudents.splice(index, 1);
                localStorage.setItem('students', JSON.stringify(allStudents));
                loadStudents();
            }
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('courseFilter').value = '';
            document.getElementById('genderFilter').value = '';
            displayStudents(allStudents);
        }

        // Search and filter functionality
        document.getElementById('searchInput').addEventListener('input', filterStudents);
        document.getElementById('courseFilter').addEventListener('change', filterStudents);
        document.getElementById('genderFilter').addEventListener('change', filterStudents);

        function filterStudents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const courseFilter = document.getElementById('courseFilter').value;
            const genderFilter = document.getElementById('genderFilter').value;

            const filtered = allStudents.filter(student => {
                const matchesSearch = student.firstName.toLowerCase().includes(searchTerm) ||
                                    student.lastName.toLowerCase().includes(searchTerm) ||
                                    student.email.toLowerCase().includes(searchTerm);
                const matchesCourse = !courseFilter || student.course === courseFilter;
                const matchesGender = !genderFilter || student.gender === genderFilter;

                return matchesSearch && matchesCourse && matchesGender;
            });

            displayStudents(filtered);
        }

        // Close modal when clicking outside
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Load students on page load
        document.addEventListener('DOMContentLoaded', loadStudents);
    </script>
</body>
</html>
